name: Weather Auto Refresh

on:
  schedule:
    # Every hour at minute 5 (UTC)
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh-weather:
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "resina-project/apps/api/package-lock.json"

      - name: Setup Java (required by PAGASA PDF parser)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        working-directory: resina-project/apps/api
        run: npm ci

      - name: Fetch and store weather in Supabase
        working-directory: resina-project/apps/api
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          PAGASA_TCB_PDF_URL: ${{ secrets.PAGASA_TCB_PDF_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ] || [ -z "$OPENWEATHER_API_KEY" ]; then
            echo "Missing required secrets: SUPABASE_URL, SUPABASE_SERVICE_KEY, OPENWEATHER_API_KEY"
            exit 1
          fi

          attempt=1
          until [ $attempt -gt 3 ]
          do
            echo "Running weather fetch attempt $attempt..."
            if npm run weather:fetch; then
              echo "Weather fetch succeeded on attempt $attempt"
              exit 0
            fi

            if [ $attempt -eq 3 ]; then
              echo "Weather fetch failed after 3 attempts"
              exit 1
            fi

            echo "Attempt $attempt failed. Retrying in 20 seconds..."
            sleep 20
            attempt=$((attempt + 1))
          done
