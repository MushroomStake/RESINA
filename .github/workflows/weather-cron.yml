name: Weather Auto Refresh

on:
  schedule:
    # Every hour at minute 5 (UTC)
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  refresh-weather:
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 5
    steps:
      - name: Trigger weather cron endpoint
        env:
          WEATHER_CRON_URL: ${{ secrets.WEATHER_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$WEATHER_CRON_URL" ]; then
            echo "Missing required secret: WEATHER_CRON_URL"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing required secret: CRON_SECRET"
            exit 1
          fi

          echo "Calling $WEATHER_CRON_URL"
          response=$(curl --fail --show-error --silent \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$WEATHER_CRON_URL")

          echo "Response: $response"
          echo "$response" | grep -q '"ok":true' || {
            echo "Weather cron call did not return ok=true"
            exit 1
          }
