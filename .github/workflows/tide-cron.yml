name: Tide Daily Refresh

on:
  schedule:
    # 00:10 Asia/Manila (UTC+8) = 16:10 UTC (previous day)
    - cron: "10 16 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh-tide-window:
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "resina-project/apps/api/package-lock.json"

      - name: Install dependencies
        working-directory: resina-project/apps/api
        run: npm ci

      - name: Refresh tide window (yesterday + today)
        working-directory: resina-project/apps/api
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          STORMGLASS_API_KEY: ${{ secrets.STORMGLASS_API_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ] || [ -z "$STORMGLASS_API_KEY" ]; then
            echo "Missing required secrets: SUPABASE_URL, SUPABASE_SERVICE_KEY, STORMGLASS_API_KEY"
            exit 1
          fi

          npm run tide:refresh-window
