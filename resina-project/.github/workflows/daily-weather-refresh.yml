name: Weather Auto Refresh

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run every hour at minute 5 (UTC)
    - cron: "5 * * * *"

  # Allow manual run from GitHub Actions UI
  workflow_dispatch:

jobs:
  refresh-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "apps/api/package-lock.json"

      - name: Setup Java (required by PAGASA PDF parser)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Fetch and store weather in Supabase
        working-directory: apps/api
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          PAGASA_TCB_PDF_URL: ${{ secrets.PAGASA_TCB_PDF_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ] || [ -z "$OPENWEATHER_API_KEY" ]; then
            echo "Missing one or more required secrets: SUPABASE_URL, SUPABASE_SERVICE_KEY, OPENWEATHER_API_KEY"
            exit 1
          fi

          npm run weather:fetch
