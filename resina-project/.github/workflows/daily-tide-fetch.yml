name: Daily Tide Fetch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run at 12:05 AM Asia/Manila (UTC+8) every day
    - cron: '5 16 * * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  refresh-tide-window:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Refresh tide data window (yesterday + today)
        run: |
          npm run tide:refresh-window || (
            echo "First attempt failed, retrying in 20s..." &&
            sleep 20 &&
            npm run tide:refresh-window
          )
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          STORMGLASS_API_KEY: ${{ secrets.STORMGLASS_API_KEY }}
      
      - name: Notify on success
        if: success()
        run: echo "✅ Tide data updated successfully for $(date -u +'%Y-%m-%d')"
      
      - name: Notify on failure  
        if: failure()
        run: |
          echo "❌ Tide fetch failed"
          exit 1
